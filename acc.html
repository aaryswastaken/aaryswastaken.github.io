<!DOCTYPE html>
<html>
    <head>
        <title>accelerometer</title>
    </head>
    <body>
	    <div> ola </div>
	    <div id="data"> data?? </div>
    </body>
    <script>
	let element = document.getElementById("data");

	DeviceMotionEvent.requestPermission();
		
	addEventListener("devicemotion", (event) => {
		element.innerText = event.acceleration.x
	})
    </script>
</html>
